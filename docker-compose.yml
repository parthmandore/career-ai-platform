version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: career_postgres

    restart: always

    environment:
      POSTGRES_USER: careeruser
      POSTGRES_PASSWORD: careerpass
      POSTGRES_DB: careerdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
